name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "README.md"
      - ".github/workflows/**"
      - ".gitignore"
      - "Dockerfile"
      - "docker-compose.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR source
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          cache-version: 0

      - name: Build Jekyll site for preview
        run: |
          bundle exec jekyll build \
            --config _config.yml,_config_github_pages.yml \
            --baseurl "/pr-previews/PR_${{ github.event.pull_request.number }}"
        env:
          JEKYLL_ENV: production

      - name: Deploy preview to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: pr-previews/PR_${{ github.event.pull_request.number }}
          keep_files: true

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const previewUrl = `https://techno-robocup.github.io/pr-previews/PR_${pr.number}/`;
            const marker = `<!-- pr-preview-comment -->`;
            const body = `${marker}\n🔍 **PR Preview deployed!**\n\nYour preview is available at: ${previewUrl}\n\n*This preview is automatically updated on every push to this PR.*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
